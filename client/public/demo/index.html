<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tairovic Demos — AGR MULTIMEDIA</title>
  <meta name="robots" content="noindex, follow">
  <style>
    :root { --bg: #0a0a0f; --text: #f5f5f7; --muted: #9ca3af; --accent: #2d6db8; --line: rgba(255,255,255,.12); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 48px 24px;
    }
    .wrap { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 1.75rem; margin-bottom: 8px; }
    p.lead { color: var(--muted); margin-bottom: 32px; line-height: 1.6; }
    ul { list-style: none; display: grid; gap: 12px; }
    a {
      display: block;
      padding: 16px 20px;
      border: 1px solid var(--line);
      border-radius: 14px;
      color: var(--text);
      text-decoration: none;
      transition: border-color .2s, background .2s;
    }
    a:hover { border-color: var(--accent); background: rgba(45,109,184,.12); }
    a strong { display: block; font-size: 1.05rem; margin-bottom: 4px; }
    a span { color: var(--muted); font-size: 0.9rem; }
    .back { display: inline-block; margin-top: 32px; color: var(--accent); font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Tairovic Gebäudeservice — Demos</h1>
    <p class="lead">Kunden-Konzepte zur Auswahl. Wählen Sie eine Variante:</p>
    <ul>
      <li>
        <a href="/demo/tairovic-bez-verzija/index.html">
          <strong>Konzept 1 — ohne Farbvariante</strong>
          <span>Basisentwurf · neutral</span>
        </a>
      </li>
      <li>
        <a href="/demo/tairovic-azzura-verzija/index.html">
          <strong>Konzept 2 — Azzura</strong>
          <span>Sky-Premium · hellblau</span>
        </a>
      </li>
      <li>
        <a href="/demo/tairovic-dark-verzija/index.html">
          <strong>Konzept 3 — Dark</strong>
          <span>Dark Elegant · Goldakzente</span>
        </a>
      </li>
    </ul>
    <a class="back" href="https://www.agrmultimedia.eu/portfolio">← AGR MULTIMEDIA Portfolio</a>
  </div>
</body>
</html>
