            <h1 style="font-size: 1.5rem; color: #fff;">AGR Multimedia — Web dizajn, grafika i AI — Geislingen an der Steige</h1>
            <p><strong>AGR Multimedia</strong> je digitalni studio iz Geislingen an der Steige (Baden-Württemberg, Nemačka) koji radi sa malim preduzećima širom EU. Kombinujemo web dizajn, grafički identitet, video i digitalni marketing uz odgovorno korišćenje AI alata — mašina ubrzava skicu i produkciju, ali poruke koje grade poverenje uvek prolaze ljudsku reviziju.</p>
            <p>Počinjemo od ciljeva posetioca: ko dolazi na sajt, šta treba da uradi (poziv, forma, rezervacija), koja ponuda mora biti jasna u prvih nekoliko sekundi. Informaciona arhitektura i tekst dolaze pre „lepog izgleda”, jer struktura određuje i SEO i konverziju. U implementaciji vodimo računa o brzini učitavanja, čitljivosti na telefonu i tehničkim osnovama pretraživača — semantički naslovi, smisleni unutrašnji linkovi, sadržaj koji ljudi stvarno žele da pročitaju.</p>
            <h2 style="font-size: 1.15rem; color: #fff; margin-top: 1.5rem;">Grafički dizajn i štampa</h2>
            <p>Vizuelni identitet nije samo logo: to su pravila boja, tipografije i primena na flajerima, menijima, društvenim mrežama i štampi. Priprema datoteka za štampu i digitalne izlaze drži brend doslednim kroz kanale, bez pet različitih „verzija” brenda.</p>
            <h2 style="font-size: 1.15rem; color: #fff; margin-top: 1.25rem;">AI u podršci, ne kao zamena za strategiju</h2>
            <p>AI koristimo za istraživanje varijanti, skicu teksta i ponavljajuće zadatke; bez dizajn sistema i smernica lako se dobije generički izgled. Zato radimo hibrid: dizajn sistem + jasan feedback + AI gde štedi vreme, uz kontrolu kvaliteta pre objave.</p>
